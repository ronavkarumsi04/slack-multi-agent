version: "3.9"

services:

  # ── Main agent application ─────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: slack-agent-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://agents:agents@postgres:5432/agents
    volumes:
      - agent_logs:/app/logs
      - agent_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - agent-net

  # ── Redis (conversation memory + caching) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: slack-agent-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-net

  # ── PostgreSQL (optional — for persistent task storage) ───────────────────
  postgres:
    image: postgres:16-alpine
    container_name: slack-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agents
      POSTGRES_PASSWORD: agents
      POSTGRES_DB: agents
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agents -d agents"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-net

  # ── Prometheus metrics scraper (optional) ─────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: slack-agent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - agent-net
    profiles:
      - observability

  # ── Grafana dashboard (optional) ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: slack-agent-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - agent-net
    profiles:
      - observability

volumes:
  agent_logs:
  agent_data:
  redis_data:
  pg_data:
  grafana_data:

networks:
  agent-net:
    driver: bridge
